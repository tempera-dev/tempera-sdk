name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check-sdk-surface.py
      - run: npm --prefix packages/typescript test
      - run: python3 -m unittest discover -s packages/python/tests
        env:
          PYTHONPATH: packages/python/src
      - run: cargo test --manifest-path packages/rust/Cargo.toml
