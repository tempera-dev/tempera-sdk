name: agent-kit

on:
  pull_request:
    paths:
      - ".codex/skills/tempera-*/**"
      - ".tempera/agent-kit/**"
      - ".tempera/agent-kit.lock.json"
      - "AGENTS.md"
      - "scripts/sync-agent-kit.py"
      - ".github/workflows/agent-kit.yml"
  push:
    branches: [main]
    paths:
      - ".codex/skills/tempera-*/**"
      - ".tempera/agent-kit/**"
      - ".tempera/agent-kit.lock.json"
      - "AGENTS.md"
      - "scripts/sync-agent-kit.py"
      - ".github/workflows/agent-kit.yml"

permissions:
  contents: read

jobs:
  exact-source-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Require private contract reader
        env:
          TEMPERA_CONTRACT_READER_TOKEN: ${{ secrets.TEMPERA_CONTRACT_READER_TOKEN }}
        run: test -n "$TEMPERA_CONTRACT_READER_TOKEN"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tempera-dev/auth-hub
          ref: main
          fetch-depth: 0
          path: .agent-kit-source
          token: ${{ secrets.TEMPERA_CONTRACT_READER_TOKEN }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Verify exact committed agent-kit source
        shell: bash
        run: |
          kit_source_commit="$(python3 -c 'import json; print(json.load(open(".tempera/agent-kit.lock.json"))["source"]["commit"])')"
          python3 scripts/sync-agent-kit.py \
            --mode check \
            --source-dir .agent-kit-source/agent-kit \
            --repo-root . \
            --source-repo tempera-dev/auth-hub \
            --source-branch main \
            --source-commit "$kit_source_commit"
